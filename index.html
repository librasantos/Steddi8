      text-rendering: optimizeLegibility;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
      letter-spacing: -0.01em;
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: inherit; }
    button:focus-visible { outline: 2px solid #E07840; outline-offset: 3px; border-radius: 6px; }

    input, textarea { font-size: 16px !important; } /* prevents iOS zoom */

    @keyframes breathe {
      0%,100% { transform: scale(1); opacity:.4; }
      50% { transform: scale(1.18); opacity:.95; }
    }
    @keyframes dolphinFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-1.2deg); }

    @keyframes dolphinBlink {
      0%, 92%, 100% { transform: scaleY(1); }
      95%, 97% { transform: scaleY(0.1); }
    }

      0%,100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }

      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

      0%,100% { opacity:.4; transform:scale(.88); }

      0%   { background-position: -200% center; }

    /* ── INSTANT SPLASH — shows before JS loads ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #FBF7F2;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.4s ease;

    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-logo {

      font-size: 22px; color: #E07840;
      letter-spacing: 0.5px; margin-bottom: 28px;

      width: 6px; height: 6px; border-radius: 50%;

      animation: pulse 1.4s ease-in-out infinite;

    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Scene backgrounds ── */
    .scene-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    /* Readability scrim — softens the scene so text on top stays legible.
       Dark scenes get a dark scrim, light scenes get a light scrim. */
    .scene-layer::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(255,250,245,0.55) 0%, rgba(255,250,245,0.35) 30%, rgba(255,250,245,0.18) 60%, rgba(255,250,245,0.08) 100%);

    .scene-layer[data-dark="true"]::after {
      background: linear-gradient(180deg, rgba(10,15,25,0.35) 0%, rgba(10,15,25,0.25) 30%, rgba(10,15,25,0.12) 60%, rgba(10,15,25,0.05) 100%);

    .scene-el {
      position: absolute; user-select: none; pointer-events: none; line-height: 1;

      50% { transform: translateX(50vw) scaleX(1); }

const saveHistory = (done, deferred) => {
  try {
    const raw = localStorage.getItem(HK);
    const existing = raw ? JSON.parse(raw) : [];
    const todayRaw = new Date().toDateString();
    const todayLabel = new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    const todayIdx = existing.findIndex(e=>e.dateRaw===todayRaw);
    
    if(todayIdx >= 0) {
      // MERGE with existing today entry — don't replace it
      const prev = existing[todayIdx];
      const prevDone = prev.done || [];
      const prevDeferred = prev.deferred || [];
      // Add new done tasks that aren't already in today's history (by text match)
      const existingTexts = new Set(prevDone.map(d=>d.text));
      const newDone = (done||[]).filter(d=>!existingTexts.has(d.text));
      // Add new deferred that aren't already there
      const existingDefTexts = new Set(prevDeferred.map(d=>d.text));
      const newDeferred = (deferred||[]).filter(d=>!existingDefTexts.has(d.text));
      existing[todayIdx] = {
        ...prev,
        done: [...prevDone, ...newDone],
        deferred: [...prevDeferred, ...newDeferred],
      };
    } else {
      // First entry for today
      existing.unshift({ date: todayLabel, dateRaw: todayRaw, done: done||[], deferred: deferred||[] });
    }
    localStorage.setItem(HK, JSON.stringify(existing.slice(0,90)));
  } catch(e) {}
};
const loadHistory = () => {
  const CUTOFF = Date.now() - (60*24*60*60*1000);
  try {
    const r=localStorage.getItem(HK); if(!r) return [];
    const all=JSON.parse(r);
    const active=all.filter(e=>{ try{return new Date(e.dateRaw||e.date).getTime()>CUTOFF;}catch(x){return true;} });
    if(active.length<all.length) try{localStorage.setItem(HK,JSON.stringify(active));}catch(x){}
    return active;
  } catch(e){return[];}
};
// TODAY as a function — evaluates fresh each call so tabs open across midnight
// see the correct "today" and trigger the new-day roll-forward in ld().
const getToday = () => new Date().toDateString();
const sv = d => {
  try {
    // Save current to backup ring before overwriting (keeps last 3 backups for recovery)
    try{
      const current = localStorage.getItem(SK);
      if(current){
        const parsed = JSON.parse(current);
        const hasData = parsed && ((parsed.activeTasks&&parsed.activeTasks.length>0) || (parsed.allTasks&&parsed.allTasks.length>0) || (parsed.doneTasks&&parsed.doneTasks.length>0) || (parsed.deferred&&parsed.deferred.length>0));
        if(hasData){
          const backups = JSON.parse(localStorage.getItem("steddi_session_backups")||"[]");
          backups.unshift({ts:Date.now(), data:parsed});
          localStorage.setItem("steddi_session_backups", JSON.stringify(backups.slice(0,3)));
        }
      }
    }catch(e){}
    localStorage.setItem(SK, JSON.stringify({...d, _date: getToday()}));
  } catch(e){}
};
const ld = () => {
  try {
    const raw = localStorage.getItem(SK);
    if(!raw) return null;
    const d = JSON.parse(raw);
    const today = getToday();
    if(d._date !== today) {
      // NEW DAY — don't delete! Roll forward incomplete tasks so user's work is never lost.
      // Active tasks + queue carry over; doneTasks clears (they're already in history);
      // phase resets to checkin so the user lands on the hub fresh.
      const rolledForward = {
        ...d,
        _date: today,
        phase: "checkin",
        doneTasks: [],
        timer: null,
        // activeTasks and allTasks preserved as-is — these are incomplete work
      };
      // Persist the rolled-forward state immediately so refresh doesn't re-roll
      try { localStorage.setItem(SK, JSON.stringify(rolledForward)); } catch(e){}
      return rolledForward;
    }
    return d;
  } catch(e){
    // Parse failed — preserve raw for forensics before returning null
    try {
      const raw = localStorage.getItem(SK);
      if(raw) localStorage.setItem("steddi_v3_corrupted_"+Date.now(), raw);
    } catch(err){}
    return null;
  }
};

    // Save the raw text to a recovery slot, then return [] so the app can continue.
    try {
      const raw = localStorage.getItem(DK);
      if(raw) localStorage.setItem("steddi_dump_v2_corrupted_"+Date.now(), raw);
    } catch(err){}
    return [];
  }
};

const _startSrc=buf=>{ if(!_actx||!_gainNode||!buf)return; try{if(_srcNode){_srcNode.stop();_srcNode.disconnect();_srcNode=null;}}catch(e){} try{const s=_actx.createBufferSource();s.buffer=buf;s.loop=true;s.connect(_gainNode);s.start(0);_srcNode=s;}catch(e){} };
const playSound=url=>{ _initAudio(); if(!url||!_actx)return; if(_actx.state==="suspended")_actx.resume(); _curUrl=url; fetch(url).then(r=>r.arrayBuffer()).then(ab=>_actx.decodeAudioData(ab)).then(buf=>{_curBuf=buf;_startSrc(buf);}).catch(()=>{}); };

// ── TIMER CHIME ────────────────────────────────────────────────
// Plays a soft bell-like chime when the focus timer completes.
// Synthesized inline so it works offline and doesn't need an audio file.
// Uses a short attack + long decay to feel gentle, not startling.
const playChime = () => {
  try {
    _initAudio();
    if(!_actx) return;
    if(_actx.state === "suspended") _actx.resume();
    // Pleasant E5 (659 Hz) + A5 (880 Hz) major third interval — warm, not alarming
    const freqs = [659.25, 880];
    const now = _actx.currentTime;
    freqs.forEach((freq, i) => {
      const osc = _actx.createOscillator();
      const gain = _actx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, now);
      // Soft attack → long gentle decay (bell-like)
      gain.gain.setValueAtTime(0, now + i * 0.06);
      gain.gain.linearRampToValueAtTime(0.25, now + i * 0.06 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.06 + 1.6);
      osc.connect(gain);
      gain.connect(_actx.destination);
      osc.start(now + i * 0.06);
      osc.stop(now + i * 0.06 + 1.8);
    });
  } catch(e) { /* silent — chime is nice-to-have */ }
};

  const handleBgUpload = (file) => {
    if(!file) return;
    if(!file.type.startsWith("image/")){ alert("Please pick an image file."); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1400;
        const scale = img.width > maxW ? maxW/img.width : 1;
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
        // Detect if the image is dark-ish (sample average brightness)
        try{
          const sample = ctx.getImageData(0,0,Math.min(50,canvas.width),Math.min(50,canvas.height));
          let total=0, count=0;
          for(let i=0;i<sample.data.length;i+=16){
            total += (sample.data[i]+sample.data[i+1]+sample.data[i+2])/3;
            count++;
          }
          const avg = count>0?total/count:128;
          saveCustomBgDark(avg < 110);
        }catch(e){}
        saveCustomBg(dataUrl);
        saveTheme("custom");

      img.onerror = () => alert("Couldn't read that image. Try another one.");
